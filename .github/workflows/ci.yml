# Lightweight CI for pull requests and pushes.
# Compiles TypeScript, runs unit tests, and validates .vsix packaging.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      MD2PDF_SOURCE: ${{ github.workspace }}/md2pdf

    steps:
      - name: Checkout extension
        uses: actions/checkout@v4

      - name: Checkout md2pdf pipeline
        uses: actions/checkout@v4
        with:
          repository: dcuccia/md2pdf
          path: md2pdf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc -p ./

      - name: Run tests
        run: npx mocha out/test/**/*.test.js --ui tdd --timeout 10000

      - name: Validate .vsix packaging
        run: npx @vscode/vsce package --no-dependencies -o test-validation.vsix
