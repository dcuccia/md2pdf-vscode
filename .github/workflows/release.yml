# Build and publish a .vsix to GitHub Releases.
#
# Two modes:
#   1. AUTOMATIC (push to main) — creates a dev pre-release with a date+SHA tag
#      e.g. v0.1.0-dev.20260312.abc1234. Old dev releases are pruned (keep 5).
#   2. MANUAL (workflow_dispatch) — creates a stable (or pre-release) from the
#      version in package.json. Bump the version BEFORE triggering.
#
# Prerequisites:
#   - The md2pdf sibling repo is checked out automatically by this workflow

name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release?"
        type: boolean
        default: true

# Cancel in-flight dev builds when a new push lands on main
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MD2PDF_SOURCE: ${{ github.workspace }}/md2pdf

    steps:
      - name: Checkout extension
        uses: actions/checkout@v4

      - name: Checkout md2pdf pipeline
        uses: actions/checkout@v4
        with:
          repository: dcuccia/md2pdf
          path: md2pdf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute version and tag
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "push" ]; then
            DATE=$(date -u +%Y%m%d)
            SHA=$(echo "${{ github.sha }}" | head -c 7)
            VERSION="${BASE}-dev.${DATE}.${SHA}"
            TAG="v${VERSION}"
            IS_PRERELEASE=true
            IS_DEV=true
          else
            VERSION="${BASE}"
            TAG="v${VERSION}"
            IS_PRERELEASE=${{ inputs.prerelease }}
            IS_DEV=false
          fi
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "is_dev=$IS_DEV"       >> "$GITHUB_OUTPUT"

      - name: Package .vsix
        run: npx @vscode/vsce package --no-dependencies -o "md2pdf-${{ steps.version.outputs.version }}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## md2pdf for VS Code ${{ steps.version.outputs.tag }}

            Install manually:
            ```
            code --install-extension md2pdf-${{ steps.version.outputs.version }}.vsix
            ```

            See [CHANGELOG.md](https://github.com/dcuccia/md2pdf-vscode/blob/main/CHANGELOG.md) for details.
          files: "*.vsix"
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          generate_release_notes: true

      - name: Prune old dev releases (keep latest 5)
        if: steps.version.outputs.is_dev == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List all dev releases, sorted newest first, skip the first 5
          gh release list --limit 100 --json tagName,isPrerelease \
            | jq -r '.[] | select(.isPrerelease and (.tagName | test("-dev\\."))) | .tagName' \
            | tail -n +6 \
            | while read -r tag; do
                echo "Deleting old dev release: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
